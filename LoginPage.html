<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyAccount Login</title>
    <link
      href="http://fonts.googleapis.com/css?family=Roboto:400,100,300,100italic,300italic,400italic,500italic,500,700,700italic,900,900italic"
      rel="stylesheet"
      type="text/css"
    />

    <link type="text/css" rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <img class="mobile_login_img" src="Frame 1.png" alt="image of mobile">
      <div class="login_content">
        <p class="heading-title">Welcome Back</p>
        <p style="font-size: 20px;color: #555555;">
          Our MyAccount App allows you to access and manage your insurance
          information 24/7.
        </p>

        <form>
          <label>Email</label>
          <input
            class="input w-100"
            type="email"
            placeholder="Example@email.com"
            required
          />

          <label class="p_font">Password</label>
          <input
            class="input w-100"
            type="password"
            placeholder="At least 8 characters"
            required
          />

          <a
            href="#"
            class="forgot"
            style="float: right; margin: 15px auto"
            >Forgot Password?</a
          >
          <button class="btn p_font"
            type="submit"
            style="
              padding: 15px;
              background-color: black;
              color: white;
            "
          >
            Sign in
          </button>
        </form>
        <div class="hr-with-text">
          <span>OR</span>
        </div>
        <button class="btn btn_socialmedia">
          <img class="btn_icon"
            src="Google.svg"
          /><span class="p_font"> Sign in with Google</span>
        </button>
        <button class="btn btn_socialmedia">
          <img class="btn_icon"
            src="Facebook.svg"
          /><span class="p_font"> Sign in with Facebook</span>
        </button>
        <p class="align-center p_font" style="padding-bottom: 40px">
          Don't you have an account? <a href="#">Sign up</a>
        </p>
        <p class="copyright_text"
          style="position: fixed;
          bottom: 20px;color: #959cb6; bottom: 0%;text-align: center;"
        >
          © 2026 ALL RIGHTS RESERVED
        </p>
      </div>
      <div class="image_container">
        <img src="Art.png" alt="mobile img"  style="padding-bottom: 20px ;"/>
      </div>
    </div>
  </body>
</html>
